name: CI Doctor — Auto-fix on Failure

on:
  workflow_run:
    workflows: ["TypeScript Check"]
    types: [completed]
    branches: [main]

concurrency:
  group: ci-doctor-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  ci-doctor:
    name: CI Doctor
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.head_branch == 'main'
      && github.repository == 'imrejaul007/rez-backend'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Capture TypeScript errors
        id: capture
        run: |
          npx tsc --noEmit 2>&1 | tee /tmp/tsc-errors.txt
          ERROR_COUNT=$(grep -c "error TS" /tmp/tsc-errors.txt || echo "0")
          echo "error_count=$ERROR_COUNT" >> "$GITHUB_OUTPUT"
          echo "Remaining errors: $ERROR_COUNT"

      - name: Create fix branch
        if: steps.capture.outputs.error_count != '0'
        id: branch
        run: |
          BRANCH="fix/ci-doctor-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run CI Doctor
        if: steps.capture.outputs.error_count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
          WORKING_DIR: ${{ github.workspace }}
        run: |
          chmod +x scripts/ci-doctor-fix.py
          python3 scripts/ci-doctor-fix.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --stat | grep -qE "^\s+[0-9]"; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify TypeScript
        if: steps.changes.outputs.has_changes == 'true'
        id: verify
        run: |
          npx tsc --noEmit 2>&1 | tee /tmp/tsc-after.txt
          REMAINING=$(grep -c "error TS" /tmp/tsc-after.txt || echo "0")
          echo "remaining=$REMAINING" >> "$GITHUB_OUTPUT"
          echo "Remaining after fix: $REMAINING"

      - name: Write PR body
        if: steps.changes.outputs.has_changes == 'true'
        env:
          ERROR_COUNT: ${{ steps.capture.outputs.error_count }}
          REMAINING: ${{ steps.verify.outputs.remaining || '0' }}
        run: |
          chmod +x scripts/ci-doctor-pr-body.py
          ERROR_COUNT="$ERROR_COUNT" REMAINING="$REMAINING" python3 scripts/ci-doctor-pr-body.py

      - name: Commit fixes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "CI Doctor"
          git config user.email "ci-doctor@rez.money"
          git add -A
          git commit -m "fix(ci-doctor): auto-resolve TypeScript build errors" -m "Co-Authored-By: CI Doctor <ci-doctor@rez.money>"
          git push -u origin "$(git rev-parse --abbrev-ref HEAD)" --force-with-lease

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          ERROR_COUNT: ${{ steps.capture.outputs.error_count }}
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          gh pr create --base main --head "$BRANCH" --title "fix(ci-doctor): auto-resolve $ERROR_COUNT TypeScript build errors" --body-file /tmp/pr-body.md

      - name: No changes
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "CI Doctor found no fixable changes."
