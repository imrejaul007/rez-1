version: '3.8'

# Microservices Docker Compose
# Runs all 8 extracted BullMQ worker services alongside the monolith.
# Each service connects to the SAME Redis + MongoDB as the monolith.
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.microservices.yml up -d
#
# Cutover:
#   1. Deploy microservice alongside monolith (both consume from same queue)
#   2. Verify correctness, then disable monolith worker for that queue

x-common-env: &common-env
  MONGODB_URI: ${MONGODB_URI}
  REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
  NODE_ENV: ${NODE_ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-healthcheck: &healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 15s

services:
  rez-notification-events:
    build:
      context: ../../rez-notification-events
      dockerfile: Dockerfile
    container_name: rez-notification-events
    environment:
      <<: *common-env
      SERVICE_NAME: notification-events
      PORT: 3001
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      <<: *healthcheck
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  analytics-events:
