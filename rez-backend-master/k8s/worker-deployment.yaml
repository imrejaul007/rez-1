apiVersion: apps/v1
kind: Deployment
metadata:
  name: rez-worker
  labels:
    app: rez-worker
    tier: worker
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rez-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rez-worker
        tier: worker
        version: v1
    spec:
      containers:
      - name: worker
        image: rezapp/merchant-backend:latest
        imagePullPolicy: Always
        command:
        - node
        - dist/worker.js
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: mongodb-uri
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: cache-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: jwt-secret
        - name: CLOUDINARY_CLOUD_NAME
          valueFrom:
            secretKeyRef:
              name: cloudinary-secrets
              key: cloud-name
        - name: CLOUDINARY_API_KEY
          valueFrom:
            secretKeyRef:
              name: cloudinary-secrets
              key: api-key
        - name: CLOUDINARY_API_SECRET
          valueFrom:
            secretKeyRef:
              name: cloudinary-secrets
              key: api-secret
        - name: SENDGRID_API_KEY
          valueFrom:
            secretKeyRef:
              name: email-secrets
              key: sendgrid-api-key
        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            secretKeyRef:
              name: sms-secrets
              key: twilio-account-sid
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: sms-secrets
              key: twilio-auth-token
        - name: RAZORPAY_KEY_ID
          valueFrom:
            secretKeyRef:
              name: payment-secrets
              key: razorpay-key-id
        - name: RAZORPAY_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: payment-secrets
              key: razorpay-key-secret
        - name: DISABLE_CRON_IN_API
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "ps aux | grep 'node dist/worker.js' | grep -v grep || exit 1"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
      terminationGracePeriodSeconds: 40
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rez-worker-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: rez-worker
