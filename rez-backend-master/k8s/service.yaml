apiVersion: v1
kind: Service
metadata:
  name: merchant-backend-service
  labels:
    app: merchant-backend
spec:
  selector:
    app: merchant-backend
  ports:
  - port: 80
    targetPort: 5001
    protocol: TCP
    name: http
  type: LoadBalancer
  # Sticky sessions removed — Redis adapter (Socket.IO) makes them unnecessary
  # and they hurt load balancing, especially for mobile users changing IPs
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: merchant-backend-internal
  labels:
    app: merchant-backend
spec:
  selector:
    app: merchant-backend
  ports:
  - port: 5001
    targetPort: 5001
    protocol: TCP
    name: http
  type: ClusterIP
