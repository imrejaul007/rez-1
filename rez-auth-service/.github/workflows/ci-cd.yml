name: REZ Auth Service CI/CD

# ── Triggers ──────────────────────────────────────────────────────────────
# Run CI on every push/PR to relevant branches
# Only deploy to production on merges to main
# ────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
    paths:
      - 'rez-auth-service/**'
      - '.github/workflows/rez-auth-service*.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'rez-auth-service/**'

  # Manual trigger for emergency deploys
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

# Prevent concurrent deploys; cancel in-progress runs on new push
concurrency:
  group: rez-auth-service-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_NAME: rez-auth-service
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-auth-service

jobs:
  # ────────────────────────────────────────────────────────────────────
  # JOB 1: LINT & TYPE CHECK
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rez-auth-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rez-auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check || npm run build

  # ────────────────────────────────────────────────────────────────────
  # JOB 2: UNIT TESTS (with MongoDB + Redis)
  # ────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: rez-auth-service

    services:
      # MongoDB 7 — Auth Service primary database
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis 7 — sessions, token blacklist, rate limiting
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      # Auth Service uses these env vars for DB connections
      MONGODB_URI: mongodb://localhost:27017/rez_auth_test
      REDIS_URL: redis://localhost:6379
      # Test-only JWT secrets
      JWT_SECRET: test-jwt-secret-32-chars-minimum!!
      JWT_REFRESH_SECRET: test-refresh-secret-32-chars!!
      JWT_ADMIN_SECRET: test-admin-secret-32-chars!!
      JWT_MERCHANT_SECRET: test-merchant-secret-32-chars!!
      OTP_HMAC_SECRET: test-otp-hmac-secret-32-chars!!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rez-auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for MongoDB
        uses: jupy/pre-commit-action@v1
        with:
          # Pre-commit waits for MongoDB and Redis to be healthy before running tests
          commit.skip: true

      - name: Run tests
        run: npm test -- --passWithNoTests --forceExit
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rez-auth-service-coverage
          path: rez-auth-service/coverage/
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────
  # JOB 3: SECURITY SCAN
  # ────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: rez-auth-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: rez-auth-service
          format: 'sarif'
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ────────────────────────────────────────────────────────────────────
  # JOB 4: BUILD DOCKER IMAGE (only on main branch push)
  # ────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image-digest: ${{ steps.meta.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: rez-auth-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ────────────────────────────────────────────────────────────────────
  # JOB 5: DEPLOY TO RENDER (only on main branch push)
  # ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://rez-auth-service.onrender.com

    steps:
      - name: Trigger Render deploy
        run: |
          echo "Triggering Render deployment for ${{ env.SERVICE_NAME }}..."
          # Use Render deploy hook if configured, otherwise skip
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -X POST $RENDER_DEPLOY_HOOK_URL
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping Render trigger"
            echo "To enable auto-deploy, add RENDER_DEPLOY_HOOK_URL to GitHub Secrets"
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_AUTH_SERVICE_DEPLOY_HOOK }}

  # ────────────────────────────────────────────────────────────────────
  # JOB 6: SMOKE TESTS (after deploy)
  # ────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for deployment (30s startup time)
        run: sleep 30

      - name: Health check
        run: |
          echo "Testing: ${{ env.SERVICE_NAME }} health endpoint"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://rez-auth-service.onrender.com/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
          else
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi

      - name: Smoke test — OTP endpoint reachable
        run: |
          echo "Testing: OTP endpoint reachable"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://rez-auth-service.onrender.com/api/auth/send-otp -X POST -H "Content-Type: application/json" -d '{"phone":"9999999999"}' || echo "000")
          # 422 = validation error (phone too short) = endpoint is up and responding
          if [ "$STATUS" = "422" ] || [ "$STATUS" = "400" ] || [ "$STATUS" = "200" ]; then
            echo "✅ OTP endpoint responding (HTTP $STATUS)"
          else
            echo "⚠️  OTP endpoint returned HTTP $STATUS (may indicate a real error)"
          fi

  # ────────────────────────────────────────────────────────────────────
  # JOB 7: NOTIFY ON COMPLETION
  # ────────────────────────────────────────────────────────────────────
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: always()
    # Run even if smoke-tests are skipped (e.g., on PRs)

    steps:
      - name: Slack notification — success
        if: needs.smoke-tests.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_DEPLOY_CHANNEL || 'C05XXXXXXXXX' }}
          slack-message: |
            ✅ *REZ Auth Service* deployed successfully
            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
            Author: @${{ github.actor }}
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Slack notification — failure
        if: needs.smoke-tests.result == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_DEPLOY_CHANNEL || 'C05XXXXXXXXX' }}
          slack-message: |
            ❌ *REZ Auth Service* deployment FAILED
            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
