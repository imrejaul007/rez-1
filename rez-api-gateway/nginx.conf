# REZ API Gateway - Canonical Configuration
# Merged from nginx.optimized.conf on 2026-04-10
#
# Key features:
# - Content-Security-Policy and security headers
# - Restricted CORS to known REZ Vercel deployments only
# - All microservice location blocks (including marketing, media)
# - Response caching for GET requests
# - Advanced buffer management
# - Performance tuning (TCP fast open, client timeouts)
# - Cloudflare real-IP detection

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 8192;  # Increased from 4096 for higher concurrency
    multi_accept on;
    use epoll;  # Better event model on Linux
}

http {
    # ── PHASE 6.1: Performance Optimization ────────────────────

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    # ── Connection & Transfer Optimization ─────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Timeouts (tuned for service-to-service communication)
    proxy_connect_timeout 5s;      # Upstream connection timeout
    proxy_send_timeout 30s;        # Upstream write timeout
    proxy_read_timeout 60s;        # Upstream read timeout (increased for slow backends)

    # Phase 6.1: Client timeouts (important for preventing lingering connections)
    client_header_timeout 30s;
    client_body_timeout 30s;
    send_timeout 30s;

    # ── Buffer Optimization ────────────────────────────────────
    # Phase 6.1: Tuned for typical API response sizes (JSON, 10-100KB)
    proxy_buffer_size 8k;          # Size of proxy_buffers (first response chunk)
    proxy_buffers 16 8k;           # Number and size of buffers (128KB total)
    proxy_busy_buffers_size 16k;   # How much can be sent to client while backend is slow

    # Client body buffer (for POST/PUT payloads).
    # SECURITY: F17 — was 50M globally which let attackers DoS the proxy
    # by sending huge bodies. The backend's multer cap is 50MB and the
    # express.json cap is 10MB. We use 12M as a small headroom.
    client_body_buffer_size 128k;
    client_max_body_size 12M;

    # ── Brotli & Gzip Compression ────────────────────────────────────────────
    # COMPRESSION STRATEGY:
    # - Brotli is preferred (better compression than gzip, ~15-25% smaller)
    # - Gzip is fallback for clients that don't support Brotli
    # - Compression happens at nginx layer ONLY (not at Express backends)
    # - This avoids double-compression and reduces backend CPU load
    #
    # SECURITY NOTES:
    # BE-GW-023: Disable compression for authenticated responses to prevent BREACH attack.
    # Gzip/Brotli compression can leak sensitive information via compression ratio analysis.
    # Authenticated API responses are NOT compressed at nginx level.
    # The Express backends also disable compression to prevent double-compression.
    #
    # CACHING WITH COMPRESSION:
    # Nginx properly handles Vary: Accept-Encoding for cached responses.
    # Cache keys include Accept-Encoding so different compressed variants are cached separately.
    # This ensures clients receive the correct compressed format from cache.

    # Skip compression for authenticated responses (BREACH protection)
    map $http_authorization $skip_compression {
        ~^Bearer 1;   # Skip compression for authenticated requests
        default 0;   # Compress unauthenticated responses
    }

    # Brotli compression is commented out — Render's nginx lacks ngx_http_brotli_filter_module.
    # Uncomment if deploying to a host with brotli support.
    # brotli on;
    # brotli_vary on;
    # brotli_proxied any;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml application/json application/javascript
    #             application/xml text/xml text/javascript application/x-javascript image/svg+xml;
    # brotli_min_length 1000;
    # brotli_disable $skip_compression;

    # Gzip compression (available on Render)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               text/javascript application/x-javascript image/svg+xml;
    gzip_min_length 1000;  # Only compress responses > 1KB
    gzip_disable $skip_compression;  # Disable for authenticated requests

    # ── Logging with Extended Information ──────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent $request_time '
                    'upstream=$upstream_addr cache=$upstream_cache_status';

    log_format detailed '$remote_addr [$time_local] "$request" $status '
                        '$body_bytes_sent ${request_time}s '
                        'upstream=$upstream_addr upstream_time=${upstream_response_time}s '
                        'cache=$upstream_cache_status bytes_sent=$bytes_sent';

    log_format json escape=json
        '{'
          '"timestamp":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"request":"$request",'
          '"status":$status,'
          '"request_time":$request_time,'
          '"upstream_time":"$upstream_response_time",'
          '"bytes_sent":$bytes_sent,'
          '"http_referer":"$http_referer",'
          '"http_user_agent":"$http_user_agent",'
          '"cache_status":"$upstream_cache_status",'
          '"upstream":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log main;
    access_log /var/log/nginx/detailed.log detailed;
    # Phase 6.3: Add JSON logging for structured log parsing
    # access_log /var/log/nginx/json.log json;

    # ── Real IP from Cloudflare / Render ──────────────────────
    # Render.com routes *.onrender.com through Cloudflare, so $remote_addr
    # is a Cloudflare edge IP (162.158.x.x, 172.71.x.x, etc.), NOT the
    # real client.  Without these directives every user on the platform
    # shares a single rate-limit bucket → instant 429s.
    #
    # Cloudflare IPv4 ranges (https://www.cloudflare.com/ips-v4/)
    # BE-GW-012: These ranges are updated regularly by Cloudflare.
    # For production, implement periodic updates via a cron job or fetch from
    # Cloudflare API (https://api.cloudflare.com/client/v4/ips) at startup.
    # Last updated: 2026-04-15. Monitor for changes monthly.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # Render internal (in case Render's own LB sits between CF and nginx)
    set_real_ip_from 10.0.0.0/8;
    # BE-GW-013: Localhost is scoped to /32 only. Trusting the full /8
    # would allow any 127.x.x.x IP via X-Forwarded-For spoofing.
    # Restricting to 127.0.0.1/32 limits this to actual health checks only.
    set_real_ip_from 127.0.0.1/32;
    # Use X-Forwarded-For (CF-Connecting-IP is not passed on Render)
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ── Rate Limiting Zones ────────────────────────────────────
    # Global API rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=50r/s;

    # Auth endpoints (OTP, login, /me) - generous enough for login flow
    # which fires 5+ parallel requests (has-pin, send-otp, checkAppStatus, etc.)
    # Original: 20r/m burst=5 was too tight and caused 429 on every login attempt.
    # BE-GW-011: Use strict burst=1 for auth endpoints to enforce rate limiting
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=100r/m;

    # Per-merchant rate limiting — fall back to IP when no Authorization header.
    # Keying purely on $http_authorization put ALL anonymous requests in the
    # same bucket (empty key), and per nginx docs empty keys are uncounted, so
    # anonymous routes were also losing the protection entirely.
    # BE-GW-028: Validate Bearer token format before using as rate limit key
    # Only valid Bearer tokens should be used as rate limit keys to prevent
    # arbitrary Authorization header values from creating unique buckets.
    map $http_authorization $merchant_rate_key {
        ~^Bearer\s+[\w\-\.]+ $http_authorization;  # Valid Bearer token format only (JWTs contain '.')
        default $binary_remote_addr;              # Fall back to IP for invalid/missing auth
    }
    limit_req_zone $merchant_rate_key zone=merchant_limit:20m rate=100r/s;

    # Merchant auth endpoints (login, register, refresh) — IP-keyed, generous
    # enough for honest retries but tight enough to deter brute force.
    limit_req_zone $binary_remote_addr zone=merchant_auth_limit:10m rate=60r/m;

    # POS/billing endpoints — high-frequency but must be throttled.
    # Keying on $http_authorization alone meant requests without an Authorization
    # header produced an empty key and were NOT counted by nginx (per docs).
    # Fall back to $binary_remote_addr so unauthenticated callers are rate-limited.
    map $http_authorization $pos_rate_key {
        ""      $binary_remote_addr;
        default $http_authorization;
    }
    limit_req_zone $pos_rate_key zone=pos_limit:10m rate=30r/s;

    # Per-merchant write rate limiting (POST/PUT/DELETE) — key on token for
    # write methods only; GET/HEAD/OPTIONS are counted in merchant_limit instead.
    # For unauthenticated write requests, reuse merchant_rate_key (IP fallback).
    map $request_method $merchant_write_method_is_write {
        default 1;
        GET     0;
        HEAD    0;
        OPTIONS 0;
    }
    map $merchant_write_method_is_write $merchant_write_key {
        0   "";
        1   $merchant_rate_key;
    }
    limit_req_zone $merchant_write_key zone=merchant_write:10m rate=30r/m;

    # Return 429 Too Many Requests when rate limit is exceeded
    limit_req_status 429;

    # ── PHASE 6.1: Response Caching ────────────────────────────
    # Cache for GET requests (5 minutes)
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:50m max_size=100m inactive=5m;

    # Cache settings for different response types
    map $request_method $skip_cache {
        default 1;     # Skip caching for non-GET methods
        GET 0;         # Cache GET requests
        HEAD 0;        # Cache HEAD requests
    }

    # Skip cache for authenticated requests (to avoid security issues)
    # BE-GW-014: Explicitly check for Bearer token format to properly skip cache
    map $http_authorization $auth_cache_skip {
        ~^Bearer\s+ 1;   # Skip cache for Bearer token requests
        default 0;       # Cache for unauthenticated or malformed requests
    }

    # Skip cache for requests with query parameters that indicate real-time data
    map $args $skip_cache_query {
        ~*nocache 1;
        ~*refresh 1;
        default $skip_cache;
    }

    # BE-GW-026: Hash authorization header for cache key to prevent plain-text leakage
    # Extract Bearer token and create a deterministic hash for use in cache keys
    map $http_authorization $auth_cache_key {
        ~^Bearer\s+(?<token>.+)$ $token;  # Extract token after "Bearer "
        default "";                        # Empty key for unauthenticated requests
    }

    # DNS Resolver (for Render's dynamic IPs)
    # Phase 4 smoke test: use Docker's internal DNS (127.0.0.11) so that
    # service names like 'auth-service' and 'backend' resolve inside a compose network.
    # Falls back to public DNS for Render deploys.
    # valid=3600s keeps the DNS cache for 1h so the gateway doesn't re-resolve
    # service names every 30 seconds (which was causing 502s after cache expiry).
    # Phase 4 fix: use ONLY Docker's internal DNS — the public DNS fallback
    # was returning NXDOMAIN and nginx gave up before retrying on 127.0.0.11.
    # On Render (production), MONOLITH_URL etc. are full https://hostnames that
    # public DNS can resolve directly.
    #
    # Phase 10.5 fix: switched primary resolver from Docker's internal DNS
    # (127.0.0.11) to public DNS (Google 8.8.8.8 + Cloudflare 1.1.1.1). On Render
    # the gateway runs outside any compose network, so 127.0.0.11 does not
    # exist there and caused startup-resolution failures for upstream service
    # hostnames. Public DNS handles Render's external hostnames directly.
    # The Docker smoke-test stack still works because the upstream hostnames in
    # the compose file are fully-qualified (e.g. auth-service:3000) and Docker
    # proxies DNS lookups for any reachable nameserver, not only 127.0.0.11.
    #
    # Phase 6.23 fix: prepend 127.0.0.11 (Docker's internal DNS) so compose
    # service names like `backend` and `auth-service` resolve correctly when
    # the container is recreated (`docker compose up --force-recreate --no-deps`)
    # and ends up with a new IP. Public DNS can't resolve these private names.
    # 127.0.0.11 returns NXDOMAIN gracefully for non-Docker hostnames, so
    # Render's public hostnames still fall through to 8.8.8.8/1.1.1.1.
    resolver 127.0.0.11 8.8.8.8 1.1.1.1 valid=3600s ipv6=off;
    resolver_timeout 5s;

    # ── Backend Service Variables with HTTPS Support ──────────────
    # Map environment URLs to proxy variables (nginx doesn't support HTTPS in upstream blocks)
    #
    # M25 FIX: Changed defaults from localhost fallbacks to fail-safe values.
    # If an env var is not set in production, nginx will proxy to an invalid URL,
    # causing an immediate 502 error rather than silently hitting localhost.
    # Required env vars must be set in Render dashboard (see GATEWAY_ENV_VARS.txt).

    map $http_host $monolith_backend {
        default ${MONOLITH_URL};
    }

    map $http_host $search_backend {
        default ${SEARCH_SERVICE_URL};
    }

    map $http_host $auth_backend {
        default ${AUTH_SERVICE_URL};
    }

    map $http_host $payment_backend {
        default ${PAYMENT_SERVICE_URL};
    }

    map $http_host $wallet_backend {
        default ${WALLET_SERVICE_URL};
    }

    map $http_host $merchant_backend {
        default ${MERCHANT_SERVICE_URL};
    }

    map $http_host $order_backend {
        default ${ORDER_SERVICE_URL};
    }

    map $http_host $catalog_backend {
        default ${CATALOG_SERVICE_URL};
    }

    map $http_host $marketing_backend {
        default ${MARKETING_SERVICE_URL};
    }

    map $http_host $analytics_backend {
        default ${ANALYTICS_SERVICE_URL};
    }

    map $http_host $gamification_backend {
        default ${GAMIFICATION_SERVICE_URL};
    }

    map $http_host $media_backend {
        default ${MEDIA_SERVICE_URL};
    }

    map $http_host $finance_backend {
        default ${FINANCE_SERVICE_URL};
    }

    map $http_host $notification_backend {
        default ${NOTIFICATION_SERVICE_URL};
    }

    map $http_host $ads_backend {
        default ${ADS_SERVICE_URL};
    }

    map $http_host $karma_backend {
        default ${KARMA_SERVICE_URL};
    }

    # CORS: resolve allowed Origin for browser requests (preflight + API).
    # Hard-coded Vercel + localhost fallbacks; ${CORS_ORIGINS} adds custom hosts via envsubst.
    map $http_origin $cors_origin {
        default "";
        "https://rez-1.vercel.app" "https://rez-1.vercel.app";
        "~^https://[a-z0-9-]+\.vercel\.app$" $http_origin;
        "~^http://localhost(:[0-9]+)?$" $http_origin;
        "~^https://(${CORS_ORIGINS})$" $http_origin;
        "~^http://(${CORS_ORIGINS})$" $http_origin;
    }

    # ── Main HTTP Server ───────────────────────────────────────
    server {
        listen ${PORT};
        server_name _;

        # HIGH FIX (BE-GW-006): Restrict TLS versions and ciphers.
        # TLSv1.0 and TLSv1.1 are deprecated and vulnerable to attacks like POODLE.
        # SSLv3 is vulnerable to POODLE and must never be used.
        # Only TLSv1.2 and TLSv1.3 are allowed. Cipher suite follows NIST guidelines.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        # HIGH FIX (BE-GW-030): Add TLS session tickets for faster session resumption
        ssl_session_tickets on;
        # Note: TLS compression (CRIME/BREACH) is disabled by default in nginx 1.16+

        # Prevent nginx from generating absolute redirects with internal port
        absolute_redirect off;
        port_in_redirect off;

        # ── Security Headers ───────────────────────────────────
        # BE-GW-021: Tighten CSP to prevent XSS from upstream vulnerabilities
        add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; object-src 'none'; frame-ancestors 'none';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # HIGH FIX (BE-GW-005): Add HSTS header to enforce HTTPS.
        # Strict-Transport-Security tells browsers to only access this site via HTTPS
        # for the specified max-age (31536000 = 1 year). includeSubDomains ensures
        # all subdomains also use HTTPS. preload allows inclusion in browser HSTS preload lists.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Phase 6.3: Add cache status header for debugging
        add_header X-Cache-Status $upstream_cache_status always;

        # ── CORS Configuration ─────────────────────────────────
        # $cors_origin is set by the http-level map (Vercel + CORS_ORIGINS env).
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type,Authorization,X-Requested-With,X-CSRF-Token,X-Rez-Region,X-Device-OS,X-Device-Fingerprint,X-Rez-Signature,X-Provider-Name,X-App-Version,X-Correlation-ID,X-Request-ID,Idempotency-Key" always;
        add_header Access-Control-Max-Age "86400" always;

        # Strip CORS headers from upstream to prevent duplicates
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;

        # OPTIONS preflight — rewrite to internal location (add_header is illegal inside server if)
        if ($request_method = OPTIONS) {
            rewrite ^ /__cors_preflight last;
        }

        location = /__cors_preflight {
            internal;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type,Authorization,X-Requested-With,X-CSRF-Token,X-Rez-Region,X-Device-OS,X-Device-Fingerprint,X-Rez-Signature,X-Provider-Name,X-App-Version,X-Correlation-ID,X-Request-ID,Idempotency-Key" always;
            add_header Access-Control-Max-Age "86400" always;
            add_header Content-Length 0 always;
            return 204;
        }

        # BE-GW-019: Custom error pages for gateway errors.
        # Return JSON instead of default HTML to prevent client parsing failures.
        error_page 502 503 504 @gateway_error;
        location @gateway_error {
            default_type application/json;
            return 503 '{"success":false,"message":"Gateway unavailable","status":503}';
        }

        # ── Common Proxy Headers ───────────────────────────────
        proxy_set_header Origin $http_origin;
        proxy_set_header Host $proxy_host;
        # BE-GW-027: Set X-Forwarded-Host to preserve original request host for URL generation
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CRITICAL FIX (BE-GW-001): Use $scheme instead of hardcoded https.
        # Previously hardcoded to 'https', which breaks if gateway is behind an
        # HTTP proxy or accessed directly without TLS terminator. Now correctly
        # reflects the actual protocol used by the client request.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";  # Keep-alive
        proxy_http_version 1.1;           # HTTP/1.1 for keep-alive

        # SECURITY: Strip internal service-to-service headers from client requests.
        # These headers are only valid between internal services behind the gateway.
        # Without stripping, a public client can spoof internal service identity.
        proxy_set_header X-Internal-Token "";
        proxy_set_header X-Internal-Service "";

        # Trace ID propagation
        set $trace_id $http_x_correlation_id;
        if ($trace_id = "") { set $trace_id $request_id; }
        proxy_set_header X-Correlation-ID $trace_id;
        proxy_set_header X-Request-ID $trace_id;

        # ── Health Check ───────────────────────────────────────
        # NOTE: Using /status instead of /health to avoid browser ad blockers
        # that flag "health" endpoints as tracking pixels.
        # These locations are defined BEFORE the `add_header` inheritance point
        # at the catch-all `location /` block, so they need their own
        # Access-Control-Allow-Origin header — the server-level `if` block
        # sets `$cors_origin` but the per-location `add_header Content-Type`
        # would otherwise wipe the inherited CORS headers.
        location /status {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type,Authorization,X-Requested-With,X-CSRF-Token,X-Rez-Region,X-Device-OS,X-Device-Fingerprint,X-Rez-Signature,X-Provider-Name,X-App-Version,X-Correlation-ID,X-Request-ID,Idempotency-Key" always;
            add_header Access-Control-Max-Age "86400" always;
            return 200 '{"status":"ok","service":"rez-api-gateway","timestamp":"$time_iso8601"}';
        }

        # Keep /health as alias for backwards compatibility
        location /health {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type,Authorization,X-Requested-With,X-CSRF-Token,X-Rez-Region,X-Device-OS,X-Device-Fingerprint,X-Rez-Signature,X-Provider-Name,X-App-Version,X-Correlation-ID,X-Request-ID,Idempotency-Key" always;
            add_header Access-Control-Max-Age "86400" always;
            return 200 '{"status":"ok","service":"rez-api-gateway","timestamp":"$time_iso8601"}';
        }

        # ── Downstream Services Health Status ─────────────────
        # Returns the configured downstream service URLs so callers can
        # verify routing is in place. Deep liveness is probed by each
        # service's own /health endpoint; nginx only does passive retries.
        location /health/services {
            # BE-GW-015: Restrict to Render internal network and loopback only.
            # Exposing full internal backend URLs reduces attack surface.
            # If accessed from Render internal network, attacker gains full
            # topology visibility. Consider moving to separate internal-only port
            # or adding authentication header requirement.
            allow 10.0.0.0/8;
            allow 127.0.0.1/32;
            deny all;
            return 200 '{"service":"rez-api-gateway","upstreams":{"monolith":"$monolith_backend","orderService":"$order_backend","walletService":"$wallet_backend","paymentService":"$payment_backend","catalogService":"$catalog_backend","searchService":"$search_backend","analyticsService":"$analytics_backend","gamificationService":"$gamification_backend","marketingService":"$marketing_backend","mediaService":"$media_backend","authService":"$auth_backend","merchantService":"$merchant_backend","financeService":"$finance_backend","notificationService":"$notification_backend","karmaService":"$karma_backend"},"timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        # ── Routes (Strangler Fig Pattern) ─────────────────────

        # ── Circuit Breaker / Retry settings (applied to all proxy locations) ─────
        # On error, timeout, or 502/503/504 nginx retries the next attempt.
        # proxy_next_upstream_tries=2 means at most 1 retry beyond the first attempt.
        # Combined with proxy_connect_timeout these settings implement passive
        # circuit-breaking: repeated upstream failures fall through to the error
        # handler which returns 502/503 to the client rather than hanging.
        # BE-GW-016: No exponential backoff in nginx; retries happen immediately.
        # For mission-critical services, implement a real circuit breaker
        # (e.g., Envoy, HAProxy, or application-level via resilience4j).
        # During partial outages, immediate retries amplify load and can cascade.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;

        # Search Service
        location /api/search {
            limit_req zone=api_limit burst=100 nodelay;

            proxy_cache api_cache;
            # BE-GW-026: Cache key uses hashed token to prevent plain-text authorization header leakage
            # in cache files, server logs, and debugging output.
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 5m;      # Cache successful responses for 5 minutes
            proxy_cache_use_stale error timeout invalid_header updating;
            # Bypass cache entirely for authenticated requests; only anonymous
            # search responses are safe to share across callers.
            proxy_cache_bypass $auth_cache_skip $skip_cache_query;
            proxy_pass $search_backend;
            proxy_ssl_server_name on;
        }

        # Homepage / Recommendations — served by search-service
        location /api/homepage {
            limit_req zone=api_limit burst=100 nodelay;

            proxy_cache api_cache;
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 5m;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_bypass $auth_cache_skip $skip_cache_query;

            # B10 FIX: search service natively routes /api/homepage/* — pass path as-is
            proxy_pass $search_backend;
            proxy_ssl_server_name on;
        }

        location /api/recommendations {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_cache api_cache;
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 5m;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_bypass $auth_cache_skip $skip_cache_query;
            proxy_pass $search_backend;
            proxy_ssl_server_name on;
        }

        # B11: /api/search/stores — store-scoped search, handled by search-service.
        location /api/search/stores {
            limit_req zone=api_limit burst=100 nodelay;

            proxy_cache api_cache;
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 5m;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_bypass $auth_cache_skip $skip_cache_query;
            proxy_pass $search_backend;
            proxy_ssl_server_name on;
        }

        # B11: /api/search/history — per-user search history, served by search-service.
        location /api/search/history {
            limit_req zone=api_limit burst=50 nodelay;

            # Never cache — per-user history must not leak across callers.
            proxy_cache_bypass 1;
            proxy_no_cache 1;
            proxy_pass $search_backend;
            proxy_ssl_server_name on;
        }

        # B11: /api/home/feed — home feed lives in search-service (see /api/homepage).
        location /api/home/feed {
            limit_req zone=api_limit burst=100 nodelay;

            proxy_cache api_cache;
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 5m;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_bypass $auth_cache_skip $skip_cache_query;
            proxy_pass $search_backend;
            proxy_ssl_server_name on;
        }

        # Catalog Service
        location /api/catalog {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_cache api_cache;
            # BE-GW-026: Cache key uses hashed token to prevent plain-text authorization header leakage.
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 10m;     # Cache for 10 minutes (less frequently updated)
            proxy_cache_use_stale error timeout;
            proxy_cache_bypass $auth_cache_skip $skip_cache_query;
            proxy_pass $catalog_backend;
            proxy_ssl_server_name on;
        }

        # Order Service
        location /api/orders {
            limit_req zone=merchant_limit burst=50 nodelay;

            # Don't cache orders (real-time data)
            # SSE streams need longer read timeout and no buffering
            proxy_read_timeout 120s;
            proxy_buffering off;
            proxy_pass $order_backend;
            proxy_ssl_server_name on;
        }

        # Merchant auth endpoints — IP-keyed, must match BEFORE /api/merchant
        # so login/register/refresh use the IP-based limiter (the user has no
        # token yet during these calls).
        # BR-AUTH-1: routed to monolith because rez-merchant-service has no auth routes.
        # No rewrite — pass full path so monolith sees /api/merchant/auth/login as registered.
        location /api/merchant/auth {
            limit_req zone=merchant_auth_limit burst=20 nodelay;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        # ── Strangler-fig carve-outs: routes still in monolith only ──────────
        # These paths have no handler in rez-merchant-service yet.
        # Longer-prefix rules match before /api/merchant, so nginx sends
        # them to the monolith instead of the merchant service.

        location /api/merchant/inventory {
            limit_req zone=merchant_limit burst=50 nodelay;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        location /api/merchant/multi-stores {
            limit_req zone=merchant_limit burst=50 nodelay;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        location /api/merchant/export {
            limit_req zone=merchant_limit burst=50 nodelay;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        # /goals is registered in merchantExportRoutes (export sprint)
        location /api/merchant/goals {
            limit_req zone=merchant_limit burst=50 nodelay;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        # /broadcast/send — sprint 9 push-notification endpoint
        location /api/merchant/broadcast {
            limit_req zone=merchant_limit burst=20 nodelay;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        location /api/merchant/rez-capital {
            limit_req zone=merchant_limit burst=20 nodelay;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        location /api/merchant/aov-rewards {
            limit_req zone=merchant_limit burst=50 nodelay;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        location /api/merchant/adbazaar-summary {
            limit_req zone=merchant_limit burst=50 nodelay;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        location /api/merchant/programs {
            limit_req zone=merchant_limit burst=50 nodelay;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        # Store-nested routes only in monolith: coin-drops, branded-campaigns,
        # earning-analytics, pending-picks (creator analytics).
        # Regex location matches before the prefix /api/merchant block.
        location ~ ^/api/merchant/stores/[^/]+/(coin-drops|branded-campaigns|earning-analytics|pending-picks) {
            limit_req zone=merchant_limit burst=50 nodelay;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        # ─────────────────────────────────────────────────────────────────────

        # Merchant Service
        location /api/merchant {
            limit_req zone=merchant_limit burst=50 nodelay;
            rewrite ^/api/merchant(/.*)?$ $1 break;
            proxy_pass $merchant_backend;
            proxy_ssl_server_name on;
        }

        # Merchant web QR orders (merchant-service /web-orders)
        location /api/web-orders {
            limit_req zone=merchant_limit burst=50 nodelay;
            proxy_pass $merchant_backend;
            proxy_ssl_server_name on;
        }

        # Auth Service
        location /api/auth {
            limit_req zone=auth_limit burst=20 nodelay;
            rewrite ^/api/auth(/.*)?$ /api/v1/auth$1 break;
            proxy_pass $auth_backend;
            proxy_ssl_server_name on;
        }

        # MFA — auth-service handles MFA under /api/v1/mfa
        location /api/v1/mfa {
            limit_req zone=auth_limit burst=20 nodelay;
            # Phase 6.24 fix: removed `rewrite ^/api/v1/mfa(/.*)?$ $1 break;`
            # which was stripping the prefix before proxying. The auth-service
            # already mounts its mfa routes at `/api/v1/mfa`, so the rewrite
            # was making `/api/v1/mfa/auth/status` arrive at auth-service as
            # `/auth/status` (which 404s). Same fix applied to /api/v1/oauth.
            proxy_pass $auth_backend;
            proxy_ssl_server_name on;
        }

        # OAuth2 partner flow — auth-service handles OAuth under /api/v1/oauth
        location /api/v1/oauth {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass $auth_backend;
            proxy_ssl_server_name on;
        }

        # Phase 6.24: OAuth admin API (partner self-registration) is mounted
        # at `/api/v1/admin/oauth` in auth-service. Gated by requireInternalToken
        # so only sibling services with a valid x-internal-token header can
        # reach it.
        location /api/v1/admin/oauth {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass $auth_backend;
            proxy_ssl_server_name on;
        }

        # User auth — routed to auth service (uses BullMQ reliably, not monolith SMS).
        # Must come BEFORE the monolith catch-all so /api/user/auth/* takes priority.
        # Phase 4 smoke test fix: prepend /api/v1/auth to the rewritten path so it
        # matches the auth-service's Express mount at /api/v1/auth.
        location /api/user/auth {
            limit_req zone=auth_limit burst=20 nodelay;
            rewrite ^/api/user/auth(/.*)?$ /api/v1/auth$1 break;
            proxy_pass $auth_backend;
            proxy_ssl_server_name on;
        }

        # Payment Service
        location /api/payment {
            limit_req zone=api_limit burst=30 nodelay;
            # Payment requests must not be retried — a network timeout
            # does not mean the transaction failed on the upstream side.
            # BE-GW-017: No retries means client receives error on timeout,
            # leaving them uncertain if charge was processed. Recommend:
            # 1. Ensure payment backend is idempotent (use payment_id as key)
            # 2. Return 202 Accepted with status endpoint link
            # 3. Let client poll /api/payment/{id}/status to check outcome
            proxy_next_upstream off;
            proxy_pass $payment_backend;
            proxy_ssl_server_name on;
        }

        # Wallet Service
        location /api/wallet {
            limit_req zone=merchant_limit burst=50 nodelay;

            proxy_cache api_cache;
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 3m;
            proxy_cache_use_stale error timeout;
            proxy_cache_bypass $auth_cache_skip;

            # Phase 17 fix: do NOT rewrite the path. The backend Express router is
            # mounted at /api/wallet, so it needs to see /api/wallet/* to match.
            # Previously the rewrite stripped /api/wallet, sending the backend a
            # bare /balance which fell through to notFoundHandler.
            # To work with proxy_pass containing a path (/api/v1), we use a URI
            # block to strip /api before proxying.
            proxy_pass $wallet_backend;
            proxy_ssl_server_name on;
        }

        # Analytics Service
        location /api/analytics {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_cache api_cache;
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 15m;     # Analytics data can be cached longer
            proxy_cache_use_stale error timeout;
            # Analytics is always per-merchant — never serve a cached response
            # to an unauthenticated caller, and never let one merchant's cached
            # entry serve another merchant.
            proxy_cache_bypass $auth_cache_skip;
            proxy_pass $analytics_backend;
            proxy_ssl_server_name on;
        }

        # Gamification Service
        location /api/gamification {
            limit_req zone=merchant_limit burst=50 nodelay;

            proxy_cache api_cache;
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 5m;
            proxy_cache_use_stale error timeout;
            proxy_cache_bypass $auth_cache_skip;
            proxy_pass $gamification_backend;
            proxy_ssl_server_name on;
        }

        # Karma Service — routes to karma microservice via KARMA_SERVICE_URL env var
        location /api/karma {
            limit_req zone=merchant_limit burst=50 nodelay;

            # No caching — karma profiles, check-ins, check-outs are real-time per-user
            proxy_cache_bypass 1;
            proxy_no_cache 1;
            proxy_pass $karma_backend;
            proxy_ssl_server_name on;
        }

        # Finance Service
        location /api/finance {
            limit_req zone=api_limit burst=30 nodelay;

            # Never cache — all finance routes are authenticated
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store" always;
            proxy_pass $finance_backend;
            proxy_ssl_server_name on;
        }

        # Notification Service (push/email/SMS dispatch + token registration)
        location /api/notifications {
            limit_req zone=merchant_limit burst=50 nodelay;

            # Never cache — notification reads are per-user and writes are
            # token registrations / dispatches that must always hit the upstream.
            proxy_cache_bypass 1;
            proxy_no_cache 1;

            # rez-notification-events is a BullMQ worker (no HTTP server).
            # Route to the monolith which handles /api/notifications natively.
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        # Marketing Service
        location /api/marketing {
            limit_req zone=api_limit burst=50 nodelay;

            # No caching — marketing campaigns are real-time and per-merchant
            proxy_cache_bypass 1;
            proxy_no_cache 1;
            proxy_pass $marketing_backend;
            proxy_ssl_server_name on;
        }

        # Media Service — upload endpoint goes to rez-media-events HTTP server
        location /api/media/upload {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_cache_bypass 1;
            proxy_no_cache 1;
            client_max_body_size 100M;
            proxy_pass $media_backend;
            proxy_ssl_server_name on;
        }

        # Media Service — static file serving also goes to rez-media-events
        location /api/media/uploads/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_cache api_cache;
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 10m;
            proxy_cache_use_stale error timeout;
            client_max_body_size 100M;
            rewrite ^/api/media/uploads/(.*)$ /$1 break;
            proxy_pass $media_backend;
            proxy_ssl_server_name on;
        }

        # Media Service — all other /api/media/ requests to monolith
        location /api/media/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_cache api_cache;
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 10m;
            proxy_cache_use_stale error timeout;
            proxy_cache_bypass $auth_cache_skip;
            client_max_body_size 100M;
            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        # Ads Service — merchant ad management
        location /api/merchant/ads {
            limit_req zone=merchant_limit burst=50 nodelay;
            proxy_cache_bypass 1;
            proxy_no_cache 1;
            rewrite ^/api/merchant/ads(/.*)?$ $1 break;
            proxy_pass $ads_backend;
            proxy_ssl_server_name on;
        }

        # Ads Service — admin ad management
        location /api/admin/ads {
            limit_req zone=merchant_limit burst=30 nodelay;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            rewrite ^/api/admin/ads(/.*)?$ $1 break;
            proxy_pass $ads_backend;
            proxy_ssl_server_name on;
        }

        # Ads Service — ad serving (public)
        location /api/ads/ {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_cache api_cache;
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 1m;
            proxy_cache_use_stale error timeout;
            proxy_cache_bypass $auth_cache_skip;
            rewrite ^/api/ads/(.*)$ /$1 break;
            proxy_pass $ads_backend;
            proxy_ssl_server_name on;
        }

        # Admin API routes - stricter rate limiting for write operations
        # CRITICAL FIX (BE-GW-003): Added IP allowlist for admin endpoints.
        # Previously only rate-limited, allowing brute force attacks from any IP.
        # Now restricts to known internal networks and loopback. Adjust the allowlist
        # to match your infrastructure (Render internal, VPN ranges, office IPs, etc.).
        location /api/admin/ {
            # IP allowlist - only these ranges can access admin endpoints
            # Add your production IPs here (Render internal, VPN, office, etc.)
            allow 10.0.0.0/8;      # RFC 1918 private
            allow 172.16.0.0/12;   # RFC 1918 private
            allow 192.168.0.0/16;  # RFC 1918 private
            allow 127.0.0.1/32;    # Localhost
            # Cloudflare IPs for production behind Cloudflare
            allow 173.245.48.0/20;
            allow 103.21.244.0/22;
            allow 103.22.200.0/22;
            allow 103.31.4.0/22;
            allow 141.101.64.0/18;
            allow 108.162.192.0/18;
            allow 190.93.240.0/20;
            allow 188.114.96.0/20;
            allow 197.234.240.0/22;
            allow 198.41.128.0/17;
            allow 162.158.0.0/15;
            allow 104.16.0.0/13;
            allow 104.24.0.0/14;
            allow 172.64.0.0/13;
            allow 131.0.72.0/22;
            deny all;  # Reject all other IPs

            limit_req zone=merchant_limit burst=30 nodelay;

            # Security headers
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;

            # No caching for admin operations
            proxy_no_cache 1;
            proxy_cache_bypass 1;

            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }

        # Socket.io — WebSocket upgrade passthrough to monolith
        # MUST be before the catch-all location /.
        # The main proxy_set_header Connection "" block disables keep-alive
        # upgrading — this location overrides both Upgrade and Connection
        # headers specifically for socket.io traffic so WS handshake succeeds.
        location /socket.io/ {
            limit_req zone=api_limit burst=200 nodelay;

            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # CRITICAL FIX (BE-GW-001): Use $scheme instead of hardcoded https
            proxy_set_header X-Forwarded-Proto $scheme;

            # CRITICAL FIX (BE-GW-002): Reduced Socket.io timeout from 24h to 5min.
            # Intermediate proxies (ISPs, CDNs) typically enforce 60-90s timeouts
            # regardless of this setting, so a 24h timeout was unrealistic.
            # The client MUST implement heartbeat/ping every 30s and handle
            # reconnection logic on disconnect. 300s is the practical maximum
            # for WebSocket connections through most proxies.
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # No buffering for real-time traffic
            proxy_buffering off;
            proxy_cache_bypass 1;
            proxy_no_cache 1;
        }

        # Monolith (Catch-all for remaining endpoints)
        location / {
            limit_req zone=api_limit burst=50 nodelay;

            # BE-GW-024: Upstream timeout is 60s globally but may mismatch service processing times
            # BE-GW-025: No request validation before forwarding to backends
            # Consider adding WAF or schema validation for content-type + body-size combinations
            # Cache only GET requests to the monolith.
            # Auth header MUST be in the key AND $auth_cache_skip MUST bypass —
            # the catch-all serves /api/user, /api/cart, /api/orders/* etc.
            # which are per-user; without these guards a logged-in user's
            # response would leak to whoever requests the same URL next.
            proxy_cache api_cache;
            proxy_cache_key "$request_method$request_uri$auth_cache_key";
            proxy_cache_valid 200 5m;
            proxy_cache_use_stale error timeout;
            proxy_cache_bypass $auth_cache_skip $skip_cache;

            proxy_pass $monolith_backend;
            proxy_ssl_server_name on;
        }
    }
}